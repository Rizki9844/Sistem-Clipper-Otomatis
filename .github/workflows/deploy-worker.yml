# ============================================================
# AutoClipperPro — Deploy Worker to Heroku via Container Registry
# ============================================================
# Builds Dockerfile.worker on GitHub Actions runner (7GB+ RAM)
# and pushes directly to Heroku Container Registry, bypassing
# Heroku's limited build infrastructure entirely.
# ============================================================

name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile.worker"
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-worker:
    name: Build & Deploy Worker to Heroku
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: echo "${{ secrets.HEROKU_API_KEY }}" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: false
          load: true
          tags: registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/worker
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to Heroku Container Registry
        run: docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/worker

      - name: Release Worker
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release worker --app ${{ secrets.HEROKU_APP_NAME }}

      - name: Verify Worker Dyno
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          sleep 10
          heroku ps --app ${{ secrets.HEROKU_APP_NAME }} | grep worker || echo "Worker dyno starting..."
