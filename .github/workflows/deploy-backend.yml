# ============================================================
# AutoClipperPro — Deploy Backend to Heroku
# ============================================================
# Triggers on push to main (only when backend/ files change)
# Uses Heroku Container Registry (Docker deploy)
# ============================================================

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "Procfile"
      - "heroku.yml"
      - "runtime.txt"

jobs:
  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login

      - name: Build & Push Docker Image
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:push web --app ${{ secrets.HEROKU_APP_NAME }}

      - name: Release
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release web --app ${{ secrets.HEROKU_APP_NAME }}

      - name: Health Check
        run: |
          sleep 15
          curl -f https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/health || echo "Health check pending..."
