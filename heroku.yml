# ============================================================
# Heroku Docker Deploy Configuration
# ============================================================
# Only deploys the WEB (API) service to Heroku.
# Worker deploys separately to Koyeb (free tier).
# ============================================================

build:
  docker:
    web: Dockerfile

run:
  web: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
